<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0c1116" />
    <title>Zebu</title>
    <!--
      Dark canvas applied immediately to avoid a white flash before the
      ThemeContext hydrates. ThemeContext will swap to .light if a user
      has explicitly chosen light mode (kept as fallback only — Zebu is
      dark-only by design).
    -->
    <style>
      html { background-color: #0c1116; }
      body { background-color: #0c1116; color: #ece7df; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
