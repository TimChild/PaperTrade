name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one deploy at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: [self-hosted, proxmox]
    # Skip deploy if commit message contains [skip deploy]
    if: "!contains(github.event.head_commit.message, '[skip deploy]')"
    timeout-minutes: 15

    env:
      COMPOSE_PROJECT_NAME: papertrade

    steps:
      - name: Display deploy info
        run: |
          echo "Deploying commit: ${{ github.sha }}"
          echo "Message: ${{ github.event.head_commit.message }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy production env file
        run: |
          if [ -f /opt/papertrade/.env ]; then
            cp /opt/papertrade/.env .env
            echo "Copied production .env"
          else
            echo "No .env file found at /opt/papertrade/.env"
            exit 1
          fi

      - name: Build and deploy
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml build
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to become healthy..."

          echo "  Waiting for PostgreSQL..."
          timeout 30 bash -c 'until docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T db pg_isready -U papertrade 2>/dev/null; do sleep 1; done'
          echo "  PostgreSQL ready"

          echo "  Waiting for Redis..."
          timeout 30 bash -c 'until docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; do sleep 1; done'
          echo "  Redis ready"

          echo "  Waiting for backend..."
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'
          echo "  Backend ready"

          echo "  Waiting for frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:80/ > /dev/null; do sleep 2; done'
          echo "  Frontend ready"

          echo "All services healthy!"

      - name: Verify deployment
        run: |
          echo "Deployment summary:"
          echo "  Commit: $(git rev-parse --short HEAD)"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml ps --format "table {{.Name}}\t{{.Status}}"
