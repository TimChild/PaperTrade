name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one deploy at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # Gate: only deploy if CI passed (ci.yml runs on the same push)
  deploy:
    name: Deploy to Production
    runs-on: [self-hosted, proxmox]
    # Skip deploy if commit message contains [skip deploy]
    if: "!contains(github.event.head_commit.message, '[skip deploy]')"
    timeout-minutes: 15

    env:
      APP_DIR: /opt/papertrade

    steps:
      - name: Display deploy info
        run: |
          echo "Deploying commit: ${{ github.sha }}"
          echo "Message: ${{ github.event.head_commit.message }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Configure git safe directory
        run: git config --global --add safe.directory ${{ env.APP_DIR }}

      - name: Pull latest code
        working-directory: ${{ env.APP_DIR }}
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Build and deploy
        working-directory: ${{ env.APP_DIR }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml build
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

      - name: Wait for services to be healthy
        working-directory: ${{ env.APP_DIR }}
        run: |
          echo "Waiting for services to become healthy..."

          # Wait for PostgreSQL
          echo "  Waiting for PostgreSQL..."
          timeout 30 bash -c 'until docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T db pg_isready -U papertrade 2>/dev/null; do sleep 1; done'
          echo "  ✅ PostgreSQL ready"

          # Wait for Redis
          echo "  Waiting for Redis..."
          timeout 30 bash -c 'until docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; do sleep 1; done'
          echo "  ✅ Redis ready"

          # Wait for Backend
          echo "  Waiting for backend..."
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'
          echo "  ✅ Backend ready"

          # Wait for Frontend
          echo "  Waiting for frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:80/ > /dev/null; do sleep 2; done'
          echo "  ✅ Frontend ready"

          echo ""
          echo "✅ All services healthy!"

      - name: Verify deployment
        working-directory: ${{ env.APP_DIR }}
        run: |
          echo "Deployment summary:"
          echo "  Commit: $(git rev-parse --short HEAD)"
          echo "  Version: $(git describe --always --dirty)"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml ps --format "table {{.Name}}\t{{.Status}}"

      - name: Rollback on failure
        if: failure()
        working-directory: ${{ env.APP_DIR }}
        run: |
          echo "⚠️ Deployment failed - attempting rollback..."
          # Roll back to previous commit
          git reset --hard HEAD~1
          docker compose -f docker-compose.yml -f docker-compose.prod.yml build
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
          echo "Rollback complete. Previous version restored."
